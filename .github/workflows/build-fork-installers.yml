name: Build fork installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-14
            target: aarch64-apple-darwin
            bundles: dmg
            artifact: meetily-macos-aarch64
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi,nsis
            artifact: meetily-windows-x64
          - name: Linux x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
            artifact: meetily-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libopenblas-dev \
            libssl-dev \
            libfuse2 \
            fuse

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build llama-helper (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cargo build --release --package llama-helper --target "${{ matrix.target }}" --features metal
          mkdir -p frontend/src-tauri/binaries
          cp "target/${{ matrix.target }}/release/llama-helper" \
            "frontend/src-tauri/binaries/llama-helper-${{ matrix.target }}"

      - name: Build llama-helper (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cargo build --release --package llama-helper --target "${{ matrix.target }}"
          mkdir -p frontend/src-tauri/binaries
          cp "target/${{ matrix.target }}/release/llama-helper" \
            "frontend/src-tauri/binaries/llama-helper-${{ matrix.target }}"

      - name: Build llama-helper (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo build --release --package llama-helper --target "${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path frontend/src-tauri/binaries | Out-Null
          Copy-Item `
            "target/${{ matrix.target }}/release/llama-helper.exe" `
            "frontend/src-tauri/binaries/llama-helper-${{ matrix.target }}.exe"

      - name: Build macOS installer
        if: runner.os == 'macOS'
        working-directory: frontend
        run: >-
          pnpm tauri build
          --config src-tauri/tauri.ci.conf.json
          --target ${{ matrix.target }}
          --bundles ${{ matrix.bundles }}

      - name: Build Windows installer
        if: runner.os == 'Windows'
        working-directory: frontend
        run: >-
          pnpm tauri build
          --config src-tauri/tauri.ci.conf.json
          --target ${{ matrix.target }}
          --bundles ${{ matrix.bundles }}

      - name: Build Linux installer
        if: runner.os == 'Linux'
        working-directory: frontend
        env:
          BLAS_INCLUDE_DIRS: /usr/include/x86_64-linux-gnu
          NO_STRIP: "true"
        run: >-
          pnpm tauri build
          --config src-tauri/tauri.ci.conf.json
          --target ${{ matrix.target }}
          --bundles ${{ matrix.bundles }}
          --
          --features openblas

      - name: Generate checksums
        shell: bash
        run: |
          bundle_dir="target/${{ matrix.target }}/release/bundle"
          while IFS= read -r -d '' installer; do
            if command -v sha256sum >/dev/null 2>&1; then
              digest="$(sha256sum "$installer" | awk '{print $1}')"
            else
              digest="$(shasum -a 256 "$installer" | awk '{print $1}')"
            fi
            printf '%s  %s\n' "$digest" "$(basename "$installer")"
          done < <(
            find "$bundle_dir" -type f \
              \( -name '*.dmg' -o -name '*.msi' -o -name '*-setup.exe' -o -name '*.deb' -o -name '*.AppImage' \) \
              -print0
          ) > "$bundle_dir/SHA256SUMS.txt"
          test -s "$bundle_dir/SHA256SUMS.txt"
          cat "$bundle_dir/SHA256SUMS.txt"

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ github.ref_name }}
          if-no-files-found: error
          retention-days: 30
          path: |
            target/${{ matrix.target }}/release/bundle/**/*.dmg
            target/${{ matrix.target }}/release/bundle/**/*.msi
            target/${{ matrix.target }}/release/bundle/**/*-setup.exe
            target/${{ matrix.target }}/release/bundle/**/*.deb
            target/${{ matrix.target }}/release/bundle/**/*.AppImage
            target/${{ matrix.target }}/release/bundle/SHA256SUMS.txt

  publish:
    name: Attach installers to tagged release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.msi
            release-artifacts/**/*-setup.exe
            release-artifacts/**/*.deb
            release-artifacts/**/*.AppImage
            release-artifacts/**/SHA256SUMS.txt
